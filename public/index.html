<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Albi - AI 취업 준비</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #webview-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* 로딩 인디케이터 */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6366F1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loading-text {
            color: #666;
            font-size: 14px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 로딩 인디케이터 -->
    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Albi 로딩 중...</div>
    </div>
    
    <!-- 실제 웹앱 iframe -->
    <iframe 
        id="webview-frame"
        src="https://albi.kr"
        allow="camera; microphone; geolocation; payment"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
        class="hidden"
    ></iframe>
    
    <script>
        // iframe 로딩 완료 시 로딩 인디케이터 숨김
        const iframe = document.getElementById('webview-frame');
        const loading = document.getElementById('loading');
        
        iframe.addEventListener('load', function() {
            loading.classList.add('hidden');
            iframe.classList.remove('hidden');
        });
        
        // 5초 후에도 로딩 중이면 강제로 iframe 표시
        setTimeout(function() {
            if (!iframe.classList.contains('hidden')) return;
            loading.classList.add('hidden');
            iframe.classList.remove('hidden');
        }, 5000);
        
        // 토스 앱인토스 Bridge API (선택)
        // window.toss = window.toss || {};
    </script>
</body>
</html>
